<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Attention OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    body{margin:0;font-family:system-ui;background:#0f1115;color:#f8fafc}
    .wrap{max-width:900px;margin:0 auto;padding:28px}
    .card{background:#181b22;border:1px solid #2a3040;border-radius:18px;padding:22px;margin-bottom:18px}
    .status{font-size:34px;font-weight:800}
    .muted{color:#9aa4b2}
    button,a.btn{background:#7dd3fc;color:#06131a;border:0;border-radius:10px;padding:10px 14px;margin:4px;text-decoration:none;display:inline-block;font-weight:700}
    .item{border-top:1px solid #2a3040;padding:12px 0}
    .pill{display:inline-block;background:#222938;border-radius:99px;padding:4px 9px;margin:3px;color:#cbd5e1;font-size:13px}
    input,textarea{width:100%;box-sizing:border-box;padding:10px;background:#0b0d12;color:white;border:1px solid #334155;border-radius:10px;margin:6px 0}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="muted">Attention OS</div>
    <div id="summary" class="status">Loading…</div>
    <div id="details" class="muted"></div>
    <p>
      <a class="btn" href="/auth/google/start">Connect Google</a>
      <button onclick="syncGoogle()">Sync Google Now</button>
      <button onclick="refresh()">Refresh</button>
    </p>
  </div>

  <div class="card">
    <h2>Attention items</h2>
    <div id="items">Loading…</div>
  </div>

  <div class="card">
    <h2>Fake notification test</h2>
    <input id="app" value="WhatsApp"/>
    <input id="title" value="Mom"/>
    <textarea id="body">Can you call me when free?</textarea>
    <button onclick="sendFake()">Send fake notification</button>
  </div>

  <div class="card">
    <h2>Google accounts</h2>
    <div id="accounts" class="muted">Loading…</div>
  </div>
</div>

<script>
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}

async function refresh(){
  const p = await fetch("/phone").then(r=>r.json());
  render(p);
  const a = await fetch("/accounts/google").then(r=>r.json());
  document.getElementById("accounts").innerHTML = a.accounts.length ? a.accounts.map(x=>esc(x.email)).join("<br>") : "No Google accounts connected";
}
function render(p){
  document.getElementById("summary").textContent = p.summary;
  document.getElementById("details").textContent = p.items?.length ? p.items.map(x=>x.title).join(" · ") : "Clear";
  const root = document.getElementById("items");
  if(!p.items?.length){ root.innerHTML = "<div class='muted'>Nothing active.</div>"; return; }
  root.innerHTML = p.items.map(x=>`
    <div class="item">
      <strong>${esc(x.title)}</strong>
      <span class="pill">${esc(x.source)}</span>
      <span class="pill">${esc(x.category)}</span>
      <div>${esc(x.body)}</div>
      <div class="muted">${esc(x.reason)}</div>
      <button onclick="done('${x.id}')">Done</button>
      <button onclick="later('${x.id}')">Later</button>
    </div>
  `).join("");
}
async function done(id){ await fetch(`/attention-items/${id}/resolve`,{method:"POST"}); refresh(); }
async function later(id){ await fetch(`/attention-items/${id}/dismiss`,{method:"POST"}); refresh(); }
async function syncGoogle(){ await fetch("/sync/google",{method:"POST"}); refresh(); }
async function sendFake(){
  await fetch("/android/notifications",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
    device_id:"web", package_name:"web.fake", app_name:document.getElementById("app").value,
    title:document.getElementById("title").value, body:document.getElementById("body").value,
    notification_key:"web_"+Date.now()
  })});
  refresh();
}
function ws(){
  const scheme = location.protocol==="https:" ? "wss":"ws";
  const socket = new WebSocket(`${scheme}://${location.host}/ws`);
  socket.onmessage = e => { const msg=JSON.parse(e.data); if(msg.phone) render(msg.phone); };
  socket.onclose = () => setTimeout(ws,1500);
  setInterval(()=>{ if(socket.readyState===1) socket.send("ping") },20000);
}
refresh(); ws();
</script>
</body>
</html>
